<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMDC Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container py-4">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark rounded mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">UMDC Dashboard</a>
  </div>
</nav>

<!-- DASHBOARD CARDS -->
<div class="row g-4">

<div class="col-md-3">
  <div class="card shadow-sm">
    <div class="card-body">
      <h6>Total Donations</h6>
      <h3 id="totalDonations">₱0</h3>
    </div>
  </div>
</div>

<div class="col-md-3">
  <div class="card shadow-sm">
    <div class="card-body">
      <h6>Users</h6>
      <h3 id="totalUsers">0</h3>
    </div>
  </div>
</div>

<div class="col-md-3">
  <div class="card shadow-sm">
    <div class="card-body">
      <h6>Campaigns</h6>
      <h3 id="totalCampaigns">0</h3>
    </div>
  </div>
</div>

<div class="col-md-3">
  <div class="card shadow-sm">
    <div class="card-body">
      <h6>Organizations</h6>
      <h3 id="totalOrgs">0</h3>
    </div>
  </div>
</div>

</div>

<!-- CHART -->
<div class="card mt-5 shadow-sm">
  <div class="card-body">
    <h5>Donation Trends</h5>
    <canvas id="donationChart"></canvas>
  </div>
</div>

<!-- TABLE -->
<div class="card mt-5 shadow-sm">
  <div class="card-body">
    <h5>Recent Donations</h5>
    <table class="table table-striped">
      <thead>
        <tr>
          <th>ID</th>
          <th>Amount</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="donationTable"></tbody>
    </table>
  </div>
</div>

</div>

<script>
fetch('../api/analytics.php')
.then(res => res.json())
.then(data => {

    document.getElementById('totalDonations').innerText = '₱' + data.totalDonations;
    document.getElementById('totalUsers').innerText = data.totalUsers;
    document.getElementById('totalCampaigns').innerText = data.totalCampaigns;
    document.getElementById('totalOrgs').innerText = data.totalOrgs;

    // Table
    let table = '';
    data.recentDonations.forEach(d => {
        table += `<tr>
            <td>${d.id}</td>
            <td>₱${d.amount}</td>
            <td>${d.status}</td>
            <td>${d.date}</td>
        </tr>`;
    });
    document.getElementById('donationTable').innerHTML = table;

    // Chart
    const ctx = document.getElementById('donationChart');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.chart.labels,
            datasets: [{
                label: 'Donations',
                data: data.chart.values,
                borderWidth: 2
            }]
        }
    });
});
</script>

</body>
</html>
